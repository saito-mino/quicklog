<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quicklog</title>
<meta name="theme-color" content="#F4F5F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quicklog">
<style>
:root{
  --ink:#232A35;
  --paper:#F4F5F2;
  --card:#FFFFFF;
  --line:#E2E5DF;
  --sub:#78808F;
  --focus:#2F5FA8;
  --danger:#A84A3B;
  --ok:#2F7A50;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Yu Gothic",Meiryo,system-ui,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.6;
}
.num{font-family:"SF Mono",SFMono-Regular,Consolas,"Roboto Mono",monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:680px;margin:0 auto;padding:12px 12px 80px}

header{display:flex;align-items:baseline;justify-content:space-between;padding:10px 4px 14px}
.logo{font-weight:700;font-size:1.15rem;letter-spacing:.14em}
.logo small{font-weight:400;font-size:.66rem;color:var(--sub);letter-spacing:.05em;margin-left:8px}
#editToggle{border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:20px;padding:4px 14px;font-size:.78rem;cursor:pointer}
#editToggle.on{border-color:var(--focus);color:var(--focus);font-weight:600}

/* 種類タブ(全面カラー) */
.tabs{display:flex;gap:4px;overflow-x:auto;padding:4px 2px 0;scrollbar-width:thin}
.tabs::-webkit-scrollbar{height:4px}
.tab{flex:0 0 auto;border:none;color:#fff;
  border-radius:10px 10px 0 0;padding:9px 16px 11px;font-size:.86rem;cursor:pointer;position:relative;top:1px;white-space:nowrap;font-family:inherit;
  opacity:.45;font-weight:600}
.tab.active{opacity:1;font-weight:700;z-index:2}
.tab .del{display:none;margin-left:8px;color:#FFD9D9;font-weight:700}
body.editmode .tab .del{display:inline}
.tab-add{flex:0 0 auto;display:none;border:1px dashed var(--sub);background:none;color:var(--sub);border-radius:10px 10px 0 0;padding:8px 12px 10px;font-size:.86rem;cursor:pointer;position:relative;top:1px;font-family:inherit}
body.editmode .tab-add{display:block}

/* 入力カード */
.entrycard{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--ink);border-radius:0 var(--radius) var(--radius) var(--radius);padding:16px 16px 14px;position:relative;z-index:1}
.field{margin-bottom:10px}
.field label{display:block;font-size:.72rem;color:var(--sub);letter-spacing:.08em;margin-bottom:3px}
input[type=text],input[type=number],textarea,select{
  border:1px solid var(--line);border-radius:8px;background:#FCFCFB;
  padding:9px 10px;font-size:16px;font-family:inherit;color:var(--ink)}
input[type=text],input[type=number],textarea{width:100%}
input:focus,textarea:focus,select:focus{outline:2px solid var(--focus);outline-offset:-1px;border-color:var(--focus)}
textarea{resize:vertical;min-height:66px}
textarea.big{min-height:170px}
.date6{width:110px !important;letter-spacing:.08em}
.date6.bad{border-color:var(--danger);outline-color:var(--danger)}
.row2{display:flex;gap:10px;flex-wrap:wrap}
.row2 .field{flex:1;min-width:0}
.row2 label{white-space:nowrap}
.row2 .selrow{flex-wrap:nowrap}
.row2 .selrow button{padding:6px 8px;font-size:.8rem;white-space:nowrap}
.row2 .date6{width:100% !important;min-width:0}
.row2.tight{gap:8px}
.row2.tight .field{flex:0 1 auto;margin-bottom:8px}
.row2.tight label{font-size:.62rem;margin-bottom:2px}
.row2.tight .date6{width:84px !important;padding:7px 6px;font-size:14px;letter-spacing:.05em}
.row2.tight .statline{gap:8px}
.row2.tight .statline select{padding:7px 8px;font-size:.85rem;min-width:0}
.datepreview{font-size:.72rem;color:var(--sub);margin-left:10px}
.personbtn{width:100%;text-align:left;border:1px solid var(--line);border-radius:8px;background:#FCFCFB;padding:9px 10px;font-size:16px;cursor:pointer;color:var(--ink);font-family:inherit}
.personbtn.empty{color:#A9AFB9}
/* 複数人選択(チップ+追加) */
.plchips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.plchip{border:1px solid var(--line);background:#F6F7F5;border-radius:16px;padding:5px 12px;font-size:.88rem;font-family:inherit}
.plchip .rm{margin-left:8px;color:var(--danger);font-weight:700;cursor:pointer}
.pladd{border:1px dashed var(--sub);background:none;color:var(--sub);border-radius:16px;padding:5px 14px;font-size:.88rem;cursor:pointer;font-family:inherit}
/* ワンタップ選択(チップ) */
.selrow{display:flex;gap:6px;flex-wrap:wrap}
.selrow button{border:1px solid var(--line);background:#FCFCFB;border-radius:8px;padding:8px 14px;font-size:.9rem;cursor:pointer;color:var(--sub);font-family:inherit}
.selrow button.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
.selrow button.on.io-in{background:var(--ok);border-color:var(--ok)}
.selrow button.on.io-out{background:var(--danger);border-color:var(--danger)}
.selrow button.on.prio-a{background:#E0AA00;border-color:#E0AA00;color:#232A35}
.selrow button.on.prio-b{background:#7B5EA7;border-color:#7B5EA7}
.selrow button.addopt{border:1px dashed var(--sub);background:none;color:var(--sub);padding:8px 12px}
/* 時間ワンタップ */
.minrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.minrow input{width:120px;flex:0 0 auto}
.minrow .unit{font-size:.8rem;color:var(--sub);margin-right:4px}
.minrow button{border:1px solid var(--line);background:#FCFCFB;border-radius:8px;padding:8px 10px;font-size:.85rem;cursor:pointer;font-family:inherit;color:var(--ink)}
/* 省スペース型ステータス行(プルダウン+日付) */
.statline{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.statline .sl{min-width:0}
.statline label{display:block;font-size:.7rem;color:var(--sub);letter-spacing:.08em;margin-bottom:3px}
.statline select{padding:8px 10px;font-size:.92rem;font-weight:700;border-radius:8px;cursor:pointer;color:#fff;min-width:0}
.statline select.neg{background:var(--danger);border-color:var(--danger)}
.statline select.pos{background:var(--ok);border-color:var(--ok)}
.statline select option{background:#fff;color:var(--ink);font-weight:400}
.savebtn{width:100%;border:none;border-radius:8px;padding:13px;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.2em;margin-top:2px;font-family:inherit}
.editing-note{font-size:.75rem;color:var(--focus);margin-bottom:8px;display:none}

/* ツールバー・一覧 */
.toolbar{display:flex;gap:8px;margin:18px 0 10px}
.toolbar input{flex:1}
.copyall{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:0 14px;font-size:.85rem;cursor:pointer;color:var(--ink);font-family:inherit}
.filterrow{display:flex;gap:6px;margin:0 0 8px;flex-wrap:wrap}
.fbtn{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:5px 14px;font-size:.82rem;cursor:pointer;color:var(--sub);font-family:inherit}
.fbtn.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
.hint{font-size:.72rem;color:var(--sub);margin-bottom:10px;padding:0 2px}
.timeline{display:flex;flex-direction:column;gap:10px}
.rec{display:flex;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer}
.rec:hover{border-color:var(--sub)}
.rec .tabmark{flex:0 0 8px}
.rec .body{padding:10px 14px;flex:1;min-width:0}
.rec .meta{display:flex;gap:10px;align-items:baseline;font-size:.74rem;color:var(--sub);margin-bottom:2px;flex-wrap:wrap}
.rec .cat{font-weight:700;color:var(--ink)}
.badge{font-size:.68rem;border:1px solid var(--line);border-radius:10px;padding:0 8px;color:var(--sub);background:#F6F7F5}
.badge.bred{color:#fff;border-color:var(--danger);background:var(--danger);font-weight:700}
.badge.bgreen{color:#fff;border-color:var(--ok);background:var(--ok);font-weight:700}
.badge.pa{color:#232A35;border-color:#E0AA00;background:#F2CE55;font-weight:700}
.badge.pb{color:#fff;border-color:#7B5EA7;background:#7B5EA7;font-weight:700}
.rec .txt{font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.amt-in{color:var(--ok);font-weight:700}
.amt-out{color:var(--danger);font-weight:700}
.empty-timeline{color:var(--sub);font-size:.85rem;text-align:center;padding:30px 0}
.morebtn{width:100%;border:1px dashed var(--sub);background:none;border-radius:10px;padding:12px;font-size:.85rem;color:var(--sub);cursor:pointer;font-family:inherit;margin-top:4px}
#kanriBanner{margin:0 0 10px;padding:10px 14px;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1.5}
#kanriBanner.soon{background:#FFF6DC;color:#7A5C00;border:1px solid #E0AA00}
#kanriBanner.over{background:#FBE3E3;color:#8A1F1F;border:1px solid var(--danger)}
#kanriDash{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 12px 6px;margin-bottom:14px;border-top:4px solid #1F5C5C}
.kd-title{font-size:.78rem;font-weight:700;color:var(--sub);margin-bottom:8px}
.kd-row{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:6px;cursor:pointer;background:var(--card)}
.kd-row.kd-over{background:#FBE3E3;border-color:var(--danger)}
.kd-row.kd-soon{background:#FFF6DC;border-color:#E0AA00}
.kd-main{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.kd-days{font-weight:800;font-size:.92rem;min-width:70px}
.kd-over .kd-days{color:var(--danger)}
.kd-soon .kd-days{color:#7A5C00}
.kd-date{font-size:.78rem;color:var(--sub)}
.kd-cust{font-weight:700;font-size:.9rem}
.kd-kind{font-size:.88rem}
.kd-exp{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:.8rem;color:var(--sub)}
.kd-donebtn{margin-top:8px;border:1px solid var(--ok);background:var(--ok);color:#fff;border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
.dlrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.dlrow .dn{flex:1;min-width:0}
.dlrow .dd{width:92px !important}
.dlrow .dr{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 10px;font-size:.78rem;cursor:pointer;font-family:inherit;color:var(--sub);white-space:nowrap}
.dlrow .dr.on{background:#1F5C5C;border-color:#1F5C5C;color:#fff;font-weight:700}
.dlrow .dx{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 11px;font-size:.85rem;cursor:pointer;font-family:inherit;color:var(--danger)}
.dladd{border:1px dashed var(--sub);background:none;border-radius:8px;padding:8px 14px;font-size:.82rem;color:var(--sub);cursor:pointer;font-family:inherit}

/* オーバーレイ */
.overlay{display:none;position:fixed;inset:0;background:rgba(35,42,53,.45);z-index:50;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:680px;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:18px 18px 30px}
@media(min-width:700px){.overlay{align-items:center}.sheet{border-radius:16px;max-height:80vh}}
.sheet h3{font-size:.95rem;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.closebtn{border:none;background:none;font-size:1.3rem;color:var(--sub);cursor:pointer;padding:0 4px}

/* 自作ダイアログ(入力・確認) */
.dlg-overlay{display:none;position:fixed;inset:0;background:rgba(35,42,53,.5);z-index:80;align-items:center;justify-content:center;padding:20px}
.dlg-overlay.open{display:flex}
.dlg{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:400px}
.dlg .dt{font-size:.92rem;font-weight:700;margin-bottom:12px;white-space:pre-wrap}
.dlg input{margin-bottom:14px}
.dlg .dbtns{display:flex;gap:8px}
.dlg .dbtns button{flex:1;border:1px solid var(--line);background:#F6F7F5;border-radius:8px;padding:11px;font-size:.92rem;cursor:pointer;font-family:inherit;color:var(--ink)}
.dlg .dbtns button.primary{background:var(--focus);border-color:var(--focus);color:#fff;font-weight:700}
.dlg .dbtns button.danger{background:var(--danger);border-color:var(--danger);color:#fff;font-weight:700}

/* 人物ピッカー */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid var(--line);background:#F6F7F5;border-radius:16px;padding:4px 12px;font-size:.85rem;cursor:pointer;font-family:inherit}
.chip:hover{border-color:var(--focus);color:var(--focus)}
.grouptabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px}
.gtab{flex:0 0 auto;border:1px solid var(--line);background:#F6F7F5;border-radius:8px;padding:5px 12px;font-size:.83rem;cursor:pointer;white-space:nowrap;font-family:inherit}
.gtab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.gtab .del{display:none;margin-left:6px;color:#FFB3B3;font-weight:700}
body.editmode .gtab.active .del{display:inline}
.gtab-add{flex:0 0 auto;border:1px dashed var(--sub);background:none;border-radius:8px;padding:5px 10px;font-size:.83rem;cursor:pointer;color:var(--sub);font-family:inherit}
.plist{display:flex;flex-direction:column}
.plist button{text-align:left;border:none;border-bottom:1px solid var(--line);background:none;padding:11px 6px;font-size:.95rem;cursor:pointer;font-family:inherit;color:var(--ink)}
.plist button:hover{background:#F6F7F5}
.prow{display:flex;align-items:center;border-bottom:1px solid var(--line)}
.prow .pname{flex:1;text-align:left;border:none;background:none;padding:11px 6px;font-size:.95rem;cursor:pointer;font-family:inherit;color:var(--ink)}
.prow .pname:hover{background:#F6F7F5}
.prow .pedit{flex:0 0 auto;border:1px solid var(--line);border-radius:8px;background:#F6F7F5;font-size:.72rem;padding:4px 10px;color:var(--sub);cursor:pointer;font-family:inherit;margin-left:6px}
.paddrow{display:flex;gap:8px;margin-top:12px}
.paddrow input{flex:1}
.paddrow button{flex:0 0 auto;border:1px solid var(--focus);color:var(--focus);background:none;border-radius:8px;padding:0 14px;font-size:.85rem;cursor:pointer;font-family:inherit}
.picker-section-label{font-size:.7rem;color:var(--sub);letter-spacing:.1em;margin-bottom:5px}

/* 詳細 */
.detail-tab{height:8px;border-radius:8px 8px 0 0;margin:-18px -18px 14px}
.detail-cat{font-size:1.05rem;font-weight:700;margin-bottom:2px}
.detail-meta{font-size:.78rem;color:var(--sub);margin-bottom:14px}
.dl{margin-bottom:12px}
.dl .k{font-size:.7rem;color:var(--sub);letter-spacing:.08em}
.dl .v{font-size:.95rem;white-space:pre-wrap;word-break:break-word}
.bpill{display:inline-block;font-size:.9rem;font-weight:700;letter-spacing:.1em;color:#fff;border-radius:8px;padding:4px 14px;margin:2px 6px 2px 0}
.bpill.red{background:var(--danger)}
.bpill.green{background:var(--ok)}
.bpill.fy{background:#E0AA00;color:#232A35}
.bpill.fp{background:#7B5EA7}
.detail-actions{display:flex;gap:8px;margin-top:20px}
.detail-actions button{flex:1;border:1px solid var(--line);background:#F6F7F5;border-radius:8px;padding:11px;font-size:.88rem;cursor:pointer;font-family:inherit;color:var(--ink)}
.detail-actions button.danger{color:var(--danger);border-color:#E5C9C9}

#toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--ink);color:#fff;padding:14px 26px;border-radius:14px;font-size:.92rem;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;max-width:92vw;text-align:center}
#toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){#toast{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">QUICKLOG<small id="syncStat">起動中…</small></div>
    <button id="editToggle" onclick="toggleEdit()">編集モード</button>
  </header>

  <div class="tabs" id="tabs"></div>

  <div id="kanriBanner" style="display:none"></div>
  <div class="entrycard" id="entrycard">
    <div class="editing-note" id="editingNote">▶ 既存の記録を編集中です(保存で上書き)</div>
    <div id="fields"></div>
    <button class="savebtn" id="saveBtn" onclick="saveEntry()">保 存</button>
  </div>

  <div id="kanriDash" style="display:none"></div>

  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="キーワード検索(名前・内容・種別・ステータス等)" oninput="searchInput()">
    <button class="copyall" onclick="copyAll()">全件コピー</button>
  </div>
  <div class="filterrow">
    <button class="fbtn" id="fb_urg" onclick="toggleUrg()">緊急</button>
    <button class="fbtn" id="fb_imp" onclick="toggleImp()">重要</button>
    <button class="fbtn" id="fb_done" onclick="toggleDone()">完了を含む</button>
    <button class="fbtn" id="fb_arch" onclick="toggleArch()">アーカイブ</button>
  </div>
  <div class="hint">※ スペース区切りでAND検索(例:「物件 中村」=物件の中の中村様)。「未請求」「未完了」「緊急」などでも絞れます。検索中に「全件コピー」を押すと絞り込んだ結果だけをコピー(AI貼り付け用)</div>

  <div class="timeline" id="timeline"></div>
</div>

<!-- 人物ピッカー -->
<div class="overlay" id="pickerOverlay" onclick="if(event.target===this)closePicker()">
  <div class="sheet">
    <h3><span id="pickerTitle">人物を選択</span><button class="closebtn" onclick="closePicker()">×</button></h3>
    <input type="text" id="pickerSearch" placeholder="名前で検索(全分野から絞り込み)" oninput="renderPickerList()" style="margin-bottom:12px">
    <div id="recentWrap">
      <div class="picker-section-label">最近使った人</div>
      <div class="chips" id="recentChips"></div>
    </div>
    <div class="picker-section-label">分野</div>
    <div class="grouptabs" id="groupTabs"></div>
    <div class="plist" id="personList"></div>
    <div class="paddrow">
      <input type="text" id="newPersonName" placeholder="新しい人の名前">
      <button onclick="addPerson()">＋この分野に追加</button>
    </div>
  </div>
</div>

<!-- 詳細 -->
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="sheet">
    <div class="detail-tab" id="detailTab"></div>
    <div class="detail-cat" id="detailCat"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div id="detailBody"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>
</div>

<!-- 自作ダイアログ:テキスト入力 -->
<div class="dlg-overlay" id="askOverlay">
  <div class="dlg">
    <div class="dt" id="askTitle"></div>
    <input type="text" id="askInput" placeholder="">
    <div class="dbtns">
      <button onclick="askCancel()">キャンセル</button>
      <button class="primary" onclick="askOk()">OK</button>
    </div>
  </div>
</div>

<!-- 自作ダイアログ:確認 -->
<div class="dlg-overlay" id="confOverlay">
  <div class="dlg">
    <div class="dt" id="confTitle"></div>
    <div class="dbtns">
      <button onclick="confCancel()">キャンセル</button>
      <button class="danger" id="confOkBtn" onclick="confOk()">実行する</button>
    </div>
  </div>
</div>

<!-- 案件ピッカー -->
<div class="overlay" id="ankenOverlay" onclick="if(event.target===this)closeAnkenPicker()">
  <div class="sheet">
    <h3><span>案件を選択</span><button class="closebtn" onclick="closeAnkenPicker()">×</button></h3>
    <input type="text" id="ankenSearch" placeholder="案件を検索" oninput="renderAnkenList()" style="margin-bottom:8px">
    <div style="margin-bottom:10px"><button class="fbtn" id="fb_ankendone" onclick="toggleAnkenDone()">完了した案件を含む</button></div>
    <div class="plist" id="ankenList"></div>
    <div class="paddrow"><button style="flex:1" onclick="pickAnken('')">紐づけを解除(なし)</button></div>
  </div>
</div>

<!-- 物件ピッカー -->
<div class="overlay" id="bukkenOverlay" onclick="if(event.target===this)closeBukkenPicker()">
  <div class="sheet">
    <h3><span>物件を選択</span><button class="closebtn" onclick="closeBukkenPicker()">×</button></h3>
    <input type="text" id="bukkenSearch" placeholder="物件を検索" oninput="renderBukkenList()" style="margin-bottom:8px">
    <div style="margin-bottom:10px"><button class="fbtn" id="fb_bukkendone" onclick="toggleBukkenDone()">完了した物件を含む</button></div>
    <div class="plist" id="bukkenList"></div>
    <div class="paddrow"><button style="flex:1" onclick="pickBukken('')">紐づけを解除(なし)</button></div>
  </div>
</div>

const PALETTE=['#3B6FB5','#7B5EA7','#5F7F5F','#9E5E8A','#A84A3B','#4E6E9E','#8A7A3B','#2E8B8B','#3E8E5F','#C08427','#B05A6E'];

/* =============== 同期レイヤー(GAS+スプレッドシート) =============== */
const GAS_URL='https://script.google.com/macros/s/AKfycbygSxlsQ310UIm1yG9RbnB2lcvJZ_zFxoFhbboTIsoUnjWxlDFx499tn_BlhDl-x5R3/exec';
const LS_KEY='ql_key', LS_CACHE='ql_cache_v15', LS_OUTBOX='ql_outbox_v1';
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
let apiKey=lsGet(LS_KEY)||'';
let outbox=[];try{outbox=JSON.parse(lsGet(LS_OUTBOX)||'[]')||[]}catch(e){outbox=[]}
function uid(){return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function saveLocal(){
  lsSet(LS_CACHE,JSON.stringify({entries:entries,cats:cats,groups:groups,recentPeople:recentPeople}));
  lsSet(LS_OUTBOX,JSON.stringify(outbox));
}
function loadLocal(){
  try{
    let c=JSON.parse(lsGet(LS_CACHE)||'null');
    if(!c){
      /* 旧バージョンのキャッシュから記録・人物リストだけ引き継ぐ(タブ構成は新定義を使う) */
      const old=JSON.parse(lsGet('ql_cache_v14')||lsGet('ql_cache_v13')||lsGet('ql_cache_v12')||lsGet('ql_cache_v11')||lsGet('ql_cache_v10')||lsGet('ql_cache_v9')||lsGet('ql_cache_v8')||lsGet('ql_cache_v7')||lsGet('ql_cache_v6')||lsGet('ql_cache_v5')||lsGet('ql_cache_v4')||lsGet('ql_cache_v3')||lsGet('ql_cache_v1')||'null');
      if(old)c={entries:old.entries,groups:old.groups,recentPeople:old.recentPeople};
    }
    if(c){
      if(Array.isArray(c.entries))entries=c.entries;
      if(Array.isArray(c.cats)&&c.cats.length)cats=c.cats;
      if(Array.isArray(c.groups)&&c.groups.length)groups=c.groups;
      if(Array.isArray(c.recentPeople))recentPeople=c.recentPeople;
    }
  }catch(e){}
}
/* ---- 一括改修v3の自動移行 ---- */
function migrate(){
  const ren={'行政書士':'行政','宅建業':'宅建','他士業':'士業','法人顧客':'業者','個人顧客':'一般','法人':'業者','個人':'一般'};
  let g=false;
  groups.forEach(x=>{if(ren[x.name]){x.name=ren[x.name];g=true}});
  if(g)cfgSync();
  entries.forEach(en=>{
    if(en.cat==='bukken'&&!en.data.deal)en.data.deal='買い';
    if(en.cat==='anken'&&!en.data.payStat)en.data.payStat=valid6(en.data.payDate||'')?'入金済み':'未入金';
    if(en.cat==='risk'){
      en.cat='task';
      const d=en.data;
      d.doneStat=(d.status==='対応済')?'完了':'未完了';
      if(d.doneStat==='完了'&&!d.doneDate)d.doneDate=d.date||today6();
      d.content=[d.content,d.idea].filter(Boolean).join('\n');
      delete d.status;delete d.idea;
    }
    const d=en.data;
    /* 廃止した備考の中身を内容欄へ併合(見えなくならないように) */
    if(['task','shukan'].includes(en.cat)&&d.note){d.content=[d.content,d.note].filter(Boolean).join('\n');delete d.note}
    if(['jikan','shushi'].includes(en.cat)&&d.note){d.content=[d.content,d.note].filter(Boolean).join(' / ');delete d.note}
    if(en.cat==='bukken'&&d.note){d.free=[d.free,d.note].filter(Boolean).join('\n');delete d.note}
    /* 旧A〜D区分を緊急・重要フラグへ変換 */
    if(typeof d.prio==='string'){
      d.prio=({'A群':['緊急','重要'],'B群':['緊急'],'C群':['重要'],'D群':[]})[d.prio]||[];
    }
  });
}
function updStat(msg){
  const el=document.getElementById('syncStat');if(!el)return;
  el.textContent=msg||(outbox.length?('送信待ち '+outbox.length+'件'):'同期済み');
}
let flushing=false;
function enqueue(op,defer){outbox.push(op);saveLocal();updStat();if(!defer)flush()}
async function flush(){
  if(flushing||!outbox.length||!apiKey)return;
  flushing=true;
  while(outbox.length){
    const op=outbox[0];
    try{
      const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(Object.assign({key:apiKey},op))});
      const j=await res.json();
      if(j&&j.ok){outbox.shift();saveLocal();updStat()}
      else if(j&&j.error==='unauthorized'){updStat('合言葉エラー');break}
      else break;
    }catch(e){updStat('オフライン(自動で再送します)');break}
  }
  flushing=false;updStat();
}
const OTHER_LABEL={engage:'区分',source:'経路',souzoku:'相続・家族',scope:'守備範囲',delegate:'依頼先',kyodo:'共同',introducers:'紹介者',start:'開始',end:'終了',ktype:'区分',kessan:'決算月日',kazei:'消費税',kyoka:'許可満了',koken:'後見',bday:'誕生日',dl:'手動期限',budget:'金額',area:'エリア',zoning:'用途地域',size:'広さ・坪数',youto:'用途',idea:'対策',free:'自由記述',deal:'売買',prio:'区分',anken:'案件',est:'設立日',fiscal:'決算期',capital:'資本金',shares:'株式数',permits:'許認可',aoiro:'申告',kazei:'消費税',honsoku:'課税方式',sales1:'売上2期前',sales2:'売上前期',sales3:'売上当期予想',bd1:'誕生日①',bd2:'誕生日②',bd3:'誕生日③',ng1:'年賀状①',ng2:'年賀状②',ng3:'年賀状③',sm1:'暑中①',sm2:'暑中②',sm3:'暑中③'};
function oLabel(f){return OTHER_LABEL[f.k]||String(f.label||f.k).replace(/[(（].*$/,'').trim()}
function colsOf(e){
  const fs=catFields(e.cat),d=e.data;
  const c={tab:catName(e.cat),date:iso6(d.date||''),kind:'',partner:'',content:'',note:'',amount:'',done:'',doneDate:'',bill:'',payDate:'',other:''};
  const others=[];
  const oneline=v=>String(v).replace(/\s*\n+\s*/g,' / ');
  fs.forEach(f=>{
    const v=d[f.k];
    switch(f.type){
      case 'person':
        if(f.k==='partner'){c.partner=v||''}
        else if(v){others.push(oLabel(f)+': '+v)}
        break;
      case 'ankenlink':
        if(v)others.push('案件: '+v);
        break;
      case 'bukkenlink':
        if(v)others.push('物件: '+v);
        break;
      case 'personlist':
        if(v&&v.length)others.push(oLabel(f)+': '+v.join('、'));
        break;
      case 'select':
        if(f.k==='kind'||f.k==='io'){c.kind=(v&&v!=='未設定')?v:''}
        else if(f.k==='status'){c.done=v||''}
        else if(v){others.push(oLabel(f)+': '+v)}
        break;
      case 'flags':
        if(Array.isArray(v)&&v.length)others.push('区分: '+v.join('・'));
        break;
      case 'statline':
        if(f.k==='done'){c.done=d[f.sk]||'';c.doneDate=iso6(d[f.dk]||'')}
        else if(f.k==='bill'){c.bill=d[f.sk]||''}
        else if(f.k==='pay'){others.push('入金: '+(d[f.sk]||f.options[0]));c.payDate=iso6(d[f.dk]||'')}
        break;
      case 'amount':
        if(f.k==='amount')c.amount=(v!==''&&v!==undefined)?v:'';
        else if(v!==''&&v!==undefined&&v!==null)others.push(oLabel(f)+': ¥'+Number(v).toLocaleString('ja-JP'));
        break;
      case 'minutes':
        if(v)others.push('所要時間: '+fmtMin(v));
        break;
      case 'seconds':
        if(v)others.push('秒数: '+v+'秒');
        break;
      case 'date6o':
        if(valid6(v||''))others.push(oLabel(f)+': '+iso6(v));
        break;
      case 'time4':
        if(valid4(v||''))others.push(oLabel(f)+': '+fmt4(v));
        break;
      case 'md4':
        if(valid_md4(v||''))others.push(oLabel(f)+': '+v.slice(0,2)+'/'+v.slice(2,4));
        break;
      case 'deadlist':
        if(Array.isArray(v)&&v.length)others.push('手動期限: '+v.map(x=>x.n+'('+(iso6(x.d)||x.d)+(x.r?'・毎年':'')+')').join('、'));
        break;
      case 'text': case 'textarea': case 'bigtext':
        if(f.main){c.content=oneline(v||'')}
        else if(f.k==='note'){c.note=oneline(v||'')}
        else if(v){others.push(oLabel(f)+': '+oneline(v))}
        break;
    }
  });
  if(e.arch)others.push('アーカイブ済み');
  c.other=others.join(' / ');
  return c;
}
function pushEntryOp(e){enqueue({action:'save',entry:e,cols:colsOf(e)})}
let cfgTimer=null;
function cfgSync(){
  clearTimeout(cfgTimer);
  cfgTimer=setTimeout(()=>{
    enqueue({action:'config',name:'cats14',value:cats});
    enqueue({action:'config',name:'groups',value:groups});
    enqueue({action:'config',name:'recent',value:recentPeople});
  },1200);
}
async function fetchAll(){
  if(!apiKey)return;
  updStat('読込中…');
  try{
    const res=await fetch(GAS_URL+'?key='+encodeURIComponent(apiKey));
    const j=await res.json();
    if(j&&j.error==='unauthorized'){apiKey='';lsSet(LS_KEY,'');showKeyScreen('合言葉が違います。もう一度入力してください');updStat('未接続');return}
    if(!j||!j.ok)throw 0;
    let sv=j.entries||[];
    const localPrev=entries.slice();
    let resend=false;
    /* 空サーバ保護: シート作り直し直後は手元の記録を正として自動復元する */
    if(sv.length===0&&localPrev.length>0){sv=localPrev.slice();resend=true}
    outbox.filter(o=>o.action==='save').forEach(o=>{
      const i=sv.findIndex(x=>String(x.id)===String(o.entry.id));
      if(i>=0)sv[i]=o.entry;else sv.push(o.entry);
    });
    outbox.filter(o=>o.action==='delete').forEach(o=>{sv=sv.filter(x=>String(x.id)!==String(o.id))});
    sv.sort((a,b)=>(b.ts||0)-(a.ts||0));
    entries=sv;
    if(j.config){
      if(Array.isArray(j.config.cats14)&&j.config.cats14.length)cats=j.config.cats14;
      if(Array.isArray(j.config.groups)&&j.config.groups.length)groups=j.config.groups;
      if(Array.isArray(j.config.recent))recentPeople=j.config.recent;
    }
    migrate();
    /* 新しい列形式への一斉再送(初回のみ。schemaマーカーで判定) */
    if(resend||!j.config||j.config.schema!==4){
      entries.forEach(en=>enqueue({action:'save',entry:en,cols:colsOf(en)},true));
      enqueue({action:'config',name:'schema',value:4},true);
    }
    if(!cats.find(c=>c.id===activeCat))activeCat=cats[0].id;
    if(!groups.find(g=>g.id===activeGroup))activeGroup=groups[0].id;
    saveLocal();
    renderTabs();
    if(!formBusy())renderFields();
    renderTimeline();
    updStat();flush();
  }catch(e){updStat('オフライン(前回データを表示中)')}
}
function showKeyScreen(msg){
  document.getElementById('keyMsg').textContent=msg||'';
  document.getElementById('keyOverlay').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('keyInput');i.focus()},80);
}
async function submitKey(){
  const v=document.getElementById('keyInput').value.trim();
  if(!v)return;
  document.getElementById('keyMsg').textContent='確認中…';
  try{
    const res=await fetch(GAS_URL+'?key='+encodeURIComponent(v));
    const j=await res.json();
    if(j&&j.ok){
      apiKey=v;lsSet(LS_KEY,v);
      document.getElementById('keyOverlay').classList.remove('open');
      toast('接続しました');
      fetchAll();
    }else{
      document.getElementById('keyMsg').textContent='合言葉が違います';
    }
  }catch(e){document.getElementById('keyMsg').textContent='通信できません。電波を確認してください'}
}
document.addEventListener('keydown',function(e){
  const ko=document.getElementById('keyOverlay');
  if(ko&&ko.classList.contains('open')&&e.key==='Enter')submitKey();
});

/* ---- 自作ダイアログ(prompt/confirmの代わり。全環境で動く) ---- */
let askCb=null;
function askText(title,initial,cb){
  askCb=cb;
  document.getElementById('askTitle').textContent=title;
  const inp=document.getElementById('askInput');
  inp.value=initial||'';
  document.getElementById('askOverlay').classList.add('open');
  setTimeout(()=>{inp.focus();inp.select()},50);
}
function askOk(){
  const v=document.getElementById('askInput').value.trim();
  document.getElementById('askOverlay').classList.remove('open');
  const cb=askCb;askCb=null;
  if(v&&cb)cb(v);
}
function askCancel(){
  document.getElementById('askOverlay').classList.remove('open');askCb=null;
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('askOverlay').classList.contains('open')){
    if(e.key==='Enter')askOk();
    if(e.key==='Escape')askCancel();
  }
});
let confCb=null;
function askConfirm(title,okLabel,cb){
  confCb=cb;
  document.getElementById('confTitle').textContent=title;
  document.getElementById('confOkBtn').textContent=okLabel||'実行する';
  document.getElementById('confOverlay').classList.add('open');
}
function confOk(){
  document.getElementById('confOverlay').classList.remove('open');
  const cb=confCb;confCb=null;
  if(cb)cb();
}
function confCancel(){
  document.getElementById('confOverlay').classList.remove('open');confCb=null;
}

/* ---- 日付ユーティリティ(6桁 YYMMDD) ---- */
function today6(){
  const d=new Date();
  return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function valid6(s){
  if(!/^\d{6}$/.test(s))return false;
  const m=+s.slice(2,4),dd=+s.slice(4,6);
  return m>=1&&m<=12&&dd>=1&&dd<=31;
}
function valid4(s){
  if(!/^\d{4}$/.test(s))return false;
  return +s.slice(0,2)<=23&&+s.slice(2,4)<=59;
}
function fmt4(s){return valid4(s)? s.slice(0,2)+':'+s.slice(2,4) : (s||'')}
function fmt6(s){return valid6(s)? s.slice(0,2)+'/'+s.slice(2,4)+'/'+s.slice(4,6) : (s||'')}
function iso6(s){return valid6(s)? '20'+s.slice(0,2)+'-'+s.slice(2,4)+'-'+s.slice(4,6) : (s||'')}

/* ============== タブ(全面カラー) ============== */
function catOf(id){return cats.find(c=>c.id===id)}
function renderTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='tab'+(c.id===activeCat?' active':'');
    b.style.background=c.color;
    b.style.color=c.text||'#fff';
    b.innerHTML=`${esc(c.name)}<span class="del" data-del="1" style="color:${(c.text==='#fff')?'#FFD9D9':'#B34A4A'}">×</span>`;
    b.onclick=(e)=>{
      if(e.target.dataset.del){removeCat(c.id);return}
      if(document.body.classList.contains('editmode')&&c.id===activeCat){renameCat(c.id);return}
      if(c.id===activeCat)return;
      guardLeave(()=>{activeCat=c.id;editingId=null;listLimit=20;renderTabs();renderFields();renderTimeline();});
    };
    el.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='tab-add';add.textContent='＋ボタン追加';add.onclick=addCat;
  el.appendChild(add);
  const cc=catOf(activeCat);
  const sb=document.getElementById('saveBtn');
  sb.style.background=cc.color;sb.style.color=cc.text||'#fff';
  document.getElementById('entrycard').style.borderTopColor=cc.color;
}
function formDirty(){
  try{
    if(editingId)return true;
    const c=catOf(activeCat);
    const d=readFields();
    if(hasBodyOf(c,d))return true;
    const fl=c.fields.find(f=>f.type==='flags');
    if(fl&&(selState[fl.k]||[]).length)return true;
  }catch(e){return true} /* 判定できない時は安全側=入力中とみなす */
  return false;
}
let lastTouch=0;
function formBusy(){
  if(Date.now()-lastTouch<10000)return true; /* 直近10秒以内に触れていたら絶対に触らない */
  try{
    const ec=document.getElementById('entrycard');
    const ae=document.activeElement;
    if(ec&&ae&&ec.contains(ae))return true; /* カーソルがフォーム内にある間も禁止 */
  }catch(e){return true}
  return formDirty();
}
function needGuard(){
  try{
    const c=catOf(activeCat);
    const reqFlag=c.fields.find(f=>f.type==='flags'&&f.required);
    if(reqFlag&&(selState[reqFlag.k]||[]).length===0){
      const d=readFields();
      return hasBodyOf(c,d);
    }
  }catch(e){}
  return false;
}
function guardLeave(cb){
  if(needGuard()){
    askConfirm('区分を選んでいません。保存されていませんが、次の画面に行っていいですか?','移動する',cb);
    return;
  }
  cb();
}
function addCat(){
  askText('新しいボタンの名前(項目はタスク型になります)','',name=>{
    const id='c'+Date.now();
    cats.push({id,name,color:PALETTE[cats.length%PALETTE.length],fields:JSON.parse(JSON.stringify(catOf('task').fields))});
    activeCat=id;renderTabs();renderFields();
    toast('ボタンを追加しました');cfgSync();
  });
}
function renameCat(id){
  const c=catOf(id);
  askText('ボタンの名前を変更',c.name,name=>{
    c.name=name;renderTabs();renderTimeline();cfgSync();
  });
}
function removeCat(id){
  if(cats.length<=1){toast('最後の1個は削除できません');return}
  const c=catOf(id);
  askConfirm(`ボタン「${c.name}」を削除しますか?(過去の記録は残ります)`,'削除する',()=>{
    cats=cats.filter(x=>x.id!==id);
    if(activeCat===id)activeCat=cats[0].id;
    renderTabs();renderFields();cfgSync();
  });
}

/* ============== 入力欄(部品レンダラー) ============== */
let selState={};
function renderFields(vals={}){
  const c=catOf(activeCat);
  const f=document.getElementById('fields');
  document.getElementById('editingNote').style.display=editingId?'block':'none';
  selState={};plState={};
  c.fields.filter(x=>x.type==='personlist').forEach(x=>{
    plState[x.k]=Array.isArray(vals[x.k])?vals[x.k].slice():[];
  });
  let html='',i=0;const fsArr=c.fields;
  while(i<fsArr.length){
    const f0=fsArr[i];
    if(f0.row){
      const grp=[f0];let j=i+1;
      while(j<fsArr.length&&fsArr[j].row===f0.row){grp.push(fsArr[j]);j++}
      html+='<div class="row2'+(f0.row==='h1'?' tight':'')+'">'+grp.map(g=>fieldHTML(g,vals)).join('')+'</div>';
      i=j;
    }else{html+=fieldHTML(f0,vals);i++}
  }
  f.innerHTML=html;
  c.fields.filter(x=>x.type==='select').forEach(x=>{
    selState[x.k]=(x.k in vals)?(vals[x.k]??''):(x.optional?'':(x.def||x.options[0]));
    paintSelect(x);
  });
  c.fields.filter(x=>x.type==='flags').forEach(x=>{
    let fv=vals[x.k];
    if(typeof fv==='string')fv=({'A群':['緊急','重要'],'B群':['緊急'],'C群':['重要'],'D群':[]})[fv]||[];
    selState[x.k]=Array.isArray(fv)?sortFlags(fv.slice()):[];
    paintFlags(x);
  });
  c.fields.filter(x=>x.type==='date6').forEach(x=>bindDate6('f_'+x.k,false));
  c.fields.filter(x=>x.type==='date6o').forEach(x=>bindD6o('f_'+x.k));
  c.fields.filter(x=>x.type==='time4').forEach(x=>bindT4('f_'+x.k));
  c.fields.filter(x=>x.type==='md4').forEach(x=>bindMd4('f_'+x.k));
  dlState={};
  c.fields.filter(x=>x.type==='deadlist').forEach(x=>{
    dlState[x.k]=Array.isArray(vals[x.k])?vals[x.k].map(o=>({n:o.n||'',d:o.d||'',r:!!o.r})):[];
    renderDL(x.k);
  });
  c.fields.filter(x=>x.type==='statline').forEach(x=>{
    bindDate6('f_'+x.k+'_d',true);
    paintStat(x.k);
  });
  c.fields.filter(x=>x.type==='personlist').forEach(x=>renderPL(x.k));
  applyShowIf();applyBigIf();
  const main=c.fields.find(x=>x.main);
  if(main&&!editingId){const e=document.getElementById('f_'+main.k);if(e&&e.focus)setTimeout(()=>e.focus(),50)}
}
function selButtonsHTML(fd){
  let h=fd.options.map(o=>`<button data-v="${escAttr(o)}" onclick="setSel('${fd.k}','${escAttr(o)}')">${esc((fd.labels&&fd.labels[o])||o)}</button>`).join('');
  if(fd.extendable)h+=`<button class="addopt" onclick="addOption('${fd.k}')">＋</button>`;
  return h;
}
function fieldHTML(fd,vals){
  const v=vals[fd.k];
  const wrap=(inner)=>`<div class="field" id="w_${fd.k}"><label>${fd.label}${fd.hint?` <span style="letter-spacing:0;color:#A9AFB9">— ${fd.hint}</span>`:''}</label>${inner}</div>`;
  switch(fd.type){
    case 'date6':{
      const val=v||today6();
      return wrap(`<input type="text" class="date6 num" id="f_${fd.k}" inputmode="numeric" maxlength="6" value="${escAttr(val)}">`);
    }
    case 'person':return wrap(`<button class="personbtn ${v?'':'empty'}" id="f_${fd.k}" onclick="openPicker('f_${fd.k}','${fd.label}')">${esc(v||'タップして選択')}</button>`);
    case 'ankenlink':return wrap(`<button class="personbtn ${v?'':'empty'}" id="f_${fd.k}" onclick="openAnkenPicker('${fd.k}')">${esc(v||'タップして選択(任意)')}</button>`);
    case 'bukkenlink':return wrap(`<button class="personbtn ${v?'':'empty'}" id="f_${fd.k}" onclick="openBukkenPicker('${fd.k}')">${esc(v||'タップして選択(任意)')}</button>`);
    case 'date6o':return wrap(`<input type="text" class="date6 num" id="f_${fd.k}" inputmode="numeric" maxlength="6" placeholder="未入力" value="${escAttr(v||'')}">`);
    case 'time4':return wrap(`<input type="text" class="date6 num" id="f_${fd.k}" inputmode="numeric" maxlength="4" placeholder="例:1400" value="${escAttr(v||'')}">`);
    case 'md4':return wrap(`<input type="text" class="date6 num" id="f_${fd.k}" inputmode="numeric" maxlength="4" placeholder="例:0331" value="${escAttr(v||'')}">`);
    case 'deadlist':return wrap(`<div id="f_${fd.k}"></div><button type="button" class="dladd" onclick="dlAdd('${fd.k}')">＋ 期限を追加</button>`);
    case 'personlist':return wrap(`<div class="plchips" id="f_${fd.k}"></div>`);
    case 'text':return wrap(`<input type="text" id="f_${fd.k}" placeholder="${escAttr(fd.ph||'')}" value="${escAttr(v||'')}">`);
    case 'textarea':return wrap(`<textarea id="f_${fd.k}" placeholder="${escAttr(fd.ph||'')}">${esc(v||'')}</textarea>`);
    case 'bigtext':return wrap(`<textarea class="big" id="f_${fd.k}" placeholder="${escAttr(fd.ph||'')}">${esc(v||'')}</textarea>`);
    case 'amount':return wrap(`<input type="number" id="f_${fd.k}" inputmode="numeric" placeholder="0" value="${v??''}">`);
    case 'minutes':return wrap(
      `<div class="minrow"><input type="number" id="f_${fd.k}" inputmode="numeric" placeholder="0" value="${v??''}"><span class="unit">分</span>`+
      [15,30,60,120].map(m=>`<button onclick="setMin('${fd.k}',${m})">${m<60?m+'分':(m/60)+'時間'}</button>`).join('')+`</div>`);
    case 'seconds':return wrap(
      `<div class="minrow"><input type="number" id="f_${fd.k}" inputmode="numeric" placeholder="0" value="${v??''}"><span class="unit">秒</span></div>`);
    case 'select':return wrap(`<div class="selrow" id="f_${fd.k}">${selButtonsHTML(fd)}</div>`);
    case 'flags':return wrap(`<div class="selrow" id="f_${fd.k}">${fd.options.map(o=>`<button data-v="${escAttr(o)}" onclick="setFlag('${fd.k}','${escAttr(o)}')">${esc((fd.labels&&fd.labels[o])||o)}</button>`).join('')}</div>`);
    case 'statline':{
      const sv=vals[fd.sk]||fd.options[0];
      const dpart=fd.dk?`
        <div class="sl"><label>${fd.dlabel}</label>
          <input type="text" class="date6 num" id="f_${fd.k}_d" inputmode="numeric" maxlength="6" placeholder="未入力" value="${escAttr(vals[fd.dk]||'')}"></div>`:'';
      return `<div class="field" id="w_${fd.k}"><div class="statline">
        <div class="sl"><label>${fd.label}</label>
          <select id="f_${fd.k}_s" onchange="statChange('${fd.k}')">
            <option${sv===fd.options[0]?' selected':''}>${esc(fd.options[0])}</option>
            <option${sv===fd.options[1]?' selected':''}>${esc(fd.options[1])}</option>
          </select></div>${dpart}
      </div></div>`;
    }
  }
  return '';
}
/* 複数人チップの描画 */
function renderPL(k){
  const el=document.getElementById('f_'+k);if(!el)return;
  const fd=catOf(activeCat).fields.find(x=>x.k===k);
  el.innerHTML='';
  (plState[k]||[]).forEach(name=>{
    const c=document.createElement('span');
    c.className='plchip';
    c.innerHTML=esc(name)+'<span class="rm">×</span>';

      renderPL(k);
    };
    el.appendChild(c);
  });
  const add=document.createElement('button');
  add.className='pladd';
  add.textContent=(plState[k]&&plState[k].length)?'＋追加':'＋タップして選択';
  add.onclick=()=>openPickerForList(k,fd?fd.label:'人物');
  el.appendChild(add);

function statFd(k){return catOf(activeCat).fields.find(x=>x.k===k&&x.type==='statline')}
function statChange(k){
  const fd=statFd(k);if(!fd)return;
  const s=document.getElementById('f_'+k+'_s');
  if(fd.autoDate){
    const d=document.getElementById('f_'+k+'_d');
    if(s.value===fd.options[1]){ if(!valid6(d.value)){d.value=today6();d.dispatchEvent(new Event('input'))} }
    else{ d.value='';d.dispatchEvent(new Event('input')) }
  }
  paintStat(k);
}
function paintStat(k){
  const fd=statFd(k);if(!fd)return;
  const s=document.getElementById('f_'+k+'_s');if(!s)return;
  s.className=(s.value===fd.options[1])?'pos':'neg';
}
function addOption(k){
  const fd=catOf(activeCat).fields.find(x=>x.k===k);if(!fd)return;
  askText('新しい種別の名前(短めがおすすめ)','',nm=>{
    if(fd.options.includes(nm)){toast('同じ名前の種別が既にあります')}
    else fd.options.push(nm);
    const el=document.getElementById('f_'+k);
    el.innerHTML=selButtonsHTML(fd);
    selState[k]=nm;
    paintSelect(fd);applyShowIf();applyBigIf();
    toast('種別「'+nm+'」を追加しました');cfgSync();
  });
}
function bindDate6(elId,optional){
  const e=document.getElementById(elId);
  if(!e)return;
  const upd=()=>{
    e.value=e.value.replace(/[^\d]/g,'').slice(0,6);
    e.classList.toggle('bad',e.value.length===6&&!valid6(e.value));
  };
  e.oninput=upd;upd();
}
function bindT4(id){
  const e=document.getElementById(id);if(!e)return;
  const u=()=>{
    e.value=e.value.replace(/[^\d]/g,'').slice(0,4);
    e.classList.toggle('bad',e.value.length===4&&!valid4(e.value));
    calcDuration();
  };
  e.oninput=u;u();
}
function calcDuration(){
  const st=document.getElementById('f_start'),en=document.getElementById('f_end'),mi=document.getElementById('f_minutes');
  if(!st||!en||!mi)return;
  if(valid4(st.value)&&valid4(en.value)){
    let diff=(+en.value.slice(0,2)*60+ +en.value.slice(2,4))-(+st.value.slice(0,2)*60+ +st.value.slice(2,4));
    if(diff<0)diff+=1440; /* 日またぎ */
    mi.value=diff;
  }
}
function valid_md4(x){
  if(!/^\d{4}$/.test(x))return false;
  const m=+x.slice(0,2),d=+x.slice(2,4);
  return m>=1&&m<=12&&d>=1&&d<=31;
}
function bindMd4(id){
  const e=document.getElementById(id);if(!e)return;
  const u=()=>{
    e.value=e.value.replace(/[^\d]/g,'').slice(0,4);
    e.classList.toggle('bad',e.value.length===4&&!valid_md4(e.value));
  };
  e.oninput=u;u();
}
let dlState={};
function renderDL(k){
  const box=document.getElementById('f_'+k);if(!box)return;
  const arr=dlState[k]||[];
  box.innerHTML=arr.map((x,i)=>`<div class="dlrow">
    <input class="dn" placeholder="名称(例:労働保険 年度更新)" value="${escAttr(x.n||'')}" oninput="dlEdit('${k}',${i},'n',this.value)">
    <input class="dd date6 num" inputmode="numeric" maxlength="6" placeholder="6桁" value="${escAttr(x.d||'')}" oninput="dlEdit('${k}',${i},'d',this.value)">
    <button type="button" class="dr ${x.r?'on':''}" onclick="dlTgl('${k}',${i})">毎年</button>
    <button type="button" class="dx" onclick="dlDel('${k}',${i})">×</button>
  </div>`).join('');
}
function dlAdd(k){(dlState[k]=dlState[k]||[]).push({n:'',d:'',r:false});renderDL(k);}
function dlEdit(k,i,f,v){
  const x=(dlState[k]||[])[i];if(!x)return;
  x[f]=(f==='d')?v.replace(/[^\d]/g,'').slice(0,6):v;
}
function dlTgl(k,i){const x=(dlState[k]||[])[i];if(!x)return;x.r=!x.r;renderDL(k);}
function dlDel(k,i){(dlState[k]||[]).splice(i,1);renderDL(k);}
function bindD6o(id){
  const e=document.getElementById(id);if(!e)return;
  const u=()=>{
    e.value=e.value.replace(/[^\d]/g,'').slice(0,6);
    e.classList.toggle('bad',e.value.length===6&&!valid6(e.value));
  };
  e.oninput=u;u();
}
function setMin(k,m){document.getElementById('f_'+k).value=m}
function setSel(k,v){
  const fd=catOf(activeCat).fields.find(x=>x.k===k);
  if(fd&&fd.optional&&selState[k]===v){selState[k]=''}else{selState[k]=v}
  paintSelect(fd);applyShowIf();applyBigIf();
}
const FLAG_ORDER={'緊急':1,'重要':2,'なし':3};
function sortFlags(arr){return arr.sort((a,b)=>(FLAG_ORDER[a]||9)-(FLAG_ORDER[b]||9))}
function setFlag(k,v){
  const fd=catOf(activeCat).fields.find(x=>x.k===k);if(!fd)return;
  let arr=(selState[k]||[]).slice();
  if(v==='なし'){
    arr=arr.includes('なし')?[]:['なし'];
  }else{
    arr=arr.filter(x=>x!=='なし');
    const i=arr.indexOf(v);
    if(i>=0)arr.splice(i,1);else arr.push(v);
  }
  selState[k]=sortFlags(arr);
  paintFlags(fd);
}
function paintFlags(fd){
  const el=document.getElementById('f_'+fd.k);if(!el)return;
  el.querySelectorAll('button').forEach(b=>{
    const on=(selState[fd.k]||[]).includes(b.dataset.v);
    b.className=on?('on '+((fd.cls&&fd.cls[b.dataset.v])||'')):'';
  });
}
function paintSelect(fd){
  const el=document.getElementById('f_'+fd.k);if(!el)return;
  el.querySelectorAll('button').forEach(b=>{
    if(b.classList.contains('addopt'))return;
    const on=b.dataset.v===selState[fd.k];
    b.className=on?('on '+((fd.cls&&fd.cls[b.dataset.v])||'')):'';
  });
}
function showIfOk(fd){
  if(!fd.showIf)return true;
  const v=selState[fd.showIf.k];
  return fd.showIf.vs?fd.showIf.vs.includes(v):v===fd.showIf.v;
}
function applyShowIf(){
  catOf(activeCat).fields.filter(x=>x.showIf).forEach(x=>{
    const w=document.getElementById('w_'+x.k);if(!w)return;
    w.style.display=showIfOk(x)?'block':'none';
  });
}
function applyBigIf(){
  catOf(activeCat).fields.filter(x=>x.bigIf).forEach(x=>{
    const e=document.getElementById('f_'+x.k);if(!e)return;
    e.classList.toggle('big',selState[x.bigIf.k]===x.bigIf.v);
  });
}
function hasBodyOf(c,d){
  return c.fields.some(fd=>{
    if(['date6','select','statline','flags'].includes(fd.type))return false;
    const v=d[fd.k];
    if(Array.isArray(v))return v.length>0;
    return v!==''&&v!==undefined&&v!==null;
  });
}
function readFields(){
  const c=catOf(activeCat);const d={};
  c.fields.forEach(fd=>{
    if(fd.showIf&&!showIfOk(fd))return;
    if(fd.type==='statline'){
      d[fd.sk]=document.getElementById('f_'+fd.k+'_s').value;
      if(fd.dk){const de=document.getElementById('f_'+fd.k+'_d');d[fd.dk]=de?de.value.trim():''}
      return;
    }
    if(fd.type==='personlist'){
      d[fd.k]=(plState[fd.k]||[]).slice();
      return;
    }
    if(fd.type==='flags'){
      d[fd.k]=sortFlags((selState[fd.k]||[]).slice());
      return;
    }
    if(fd.type==='deadlist'){
      d[fd.k]=(dlState[fd.k]||[]).filter(x=>x.n||x.d).map(o=>({n:o.n,d:o.d,r:!!o.r}));
      return;
    }
    const e=document.getElementById('f_'+fd.k);if(!e)return;
    if(fd.type==='person'||fd.type==='ankenlink'||fd.type==='bukkenlink'){d[fd.k]=e.classList.contains('empty')?'':e.textContent}
    else if(fd.type==='select'){d[fd.k]=selState[fd.k]}
    else if(fd.type==='amount'||fd.type==='minutes'||fd.type==='seconds'){d[fd.k]=e.value===''?'':Number(e.value)}
    else{d[fd.k]=e.value.trim()}
  });
  return d;
}
function saveEntry(){
  const c=catOf(activeCat);const d=readFields();
  if(editingId){
    const prev=entries.find(x=>String(x.id)===String(editingId));
    if(prev&&Array.isArray(prev.data.doneKeys))d.doneKeys=prev.data.doneKeys;
  }
  const dateF=c.fields.find(f=>f.type==='date6');
  if(dateF&&d[dateF.k]&&!valid6(d[dateF.k])){toast('日付は6桁で入力してください(例:'+today6()+')');return}
  for(const fd of c.fields.filter(f=>f.type==='statline'&&f.dk)){
    if(d[fd.dk]&&!valid6(d[fd.dk])){toast(fd.dlabel.replace('(6桁)','')+'は6桁で入力してください');return}
  }
  for(const fd of c.fields.filter(f=>f.type==='date6o')){
    if(d[fd.k]&&!valid6(d[fd.k])){toast('日付は6桁で入力してください(例:'+today6()+')');return}
  }
  for(const fd of c.fields.filter(f=>f.type==='time4')){
    if(d[fd.k]&&!valid4(d[fd.k])){toast('時刻は4桁で入力してください(例:1400)');return}
  }
  for(const fd of c.fields.filter(f=>f.type==='md4')){
    if(fd.showIf&&!showIfOk(fd))continue;
    if(d[fd.k]&&!valid_md4(d[fd.k])){toast('月日は4桁で入力してください(例:0331)');return}
  }
  for(const fd of c.fields.filter(f=>f.type==='deadlist')){
    for(const x of (d[fd.k]||[])){
      if(!valid6(x.d)){toast('手動期限「'+(x.n||'(名称なし)')+'」の日付を6桁で入力してください');return}
    }
  }
  for(const fd of c.fields.filter(f=>f.type==='flags'&&f.required)){
    if(!((d[fd.k]||[]).length)){toast('区分を選んでください(緊急・重要・なし)');return}
  }
  if(!hasBodyOf(c,d)){toast('内容を入れてください');return}
  Object.keys(d).forEach(k=>{
    const fd=c.fields.find(x=>x.k===k);
    if(!fd)return;
    if(fd.type==='person'&&d[k])pushRecent(d[k]);
    if(fd.type==='personlist')(d[k]||[]).forEach(pushRecent);
  });
  let rec;
  if(editingId){
    const idx=entries.findIndex(x=>String(x.id)===String(editingId));
    rec={id:editingId,cat:activeCat,ts:(idx>=0?entries[idx].ts:Date.now()),data:d};
    if(idx>=0)entries[idx]=rec;else entries.unshift(rec);
    editingId=null;toast('上書き保存しました');
  }else{
    rec={id:uid(),cat:activeCat,ts:Date.now(),data:d};
    entries.unshift(rec);
    toast('保存しました');
  }
  saveLocal();
  pushEntryOp(rec);
  renderFields();renderTimeline();
}

/* ============== 期限管理(管理タブ)エンジン ============== */
function kToday(){const t=new Date();t.setHours(0,0,0,0);return t}
function pad2(n){return String(n).padStart(2,'0')}
function dstr(dt){return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate())}
function addMonthsClamp(y,m,d,add){
  /* m:1-12。元が月末なら結果も月末に合わせる(3/31+2ヶ月=5/31、12/31+2ヶ月=2/28等) */
  const lastSrc=new Date(y,m,0).getDate();
  const isEnd=(d>=lastSrc);
  let nm=m-1+add, ny=y+Math.floor(nm/12); nm=((nm%12)+12)%12;
  const lastDst=new Date(ny,nm+1,0).getDate();
  const nd=isEnd?lastDst:Math.min(d,lastDst);
  return new Date(ny,nm,nd);
}
function annualFrom(calcFn,today,done,kindKey){
  /* calcFn(y)=その年度分の対象日。直近過去分が未対応なら超過として返し、対応済みなら次回分を返す */
  let y=today.getFullYear()+1;
  while(calcFn(y)>today)y--;
  const past=calcFn(y);
  const pk=kindKey+'@'+dstr(past);
  if(!done.includes(pk))return{date:past,key:pk};
  const next=calcFn(y+1);
  return{date:next,key:kindKey+'@'+dstr(next)};
}
function fixedFrom(dt,done,kindKey){
  const key=kindKey+'@'+dstr(dt);
  if(done.includes(key))return null;
  return{date:dt,key};
}
const KD_STD=[[30,'資料依頼'],[14,'作成着手'],[7,'最終確認']];
const KD_KOKEN=[[60,'資料収集'],[30,'報告書作成']];
function kanriDeadlines(en,today){
  const d=en.data||{},out=[],done=Array.isArray(d.doneKeys)?d.doneKeys:[];
  const cust=d.partner||'(顧客未設定)';
  const put=(kind,r,steps)=>{if(!r)return;out.push({id:en.id,cust,kind,date:r.date,key:r.key,over:r.date<today,steps:steps||null})};
  const isP=(d.ktype==='個人');
  let km=0,kd_=0;
  if(isP){km=12;kd_=31}
  else if(valid_md4(d.kessan||'')){km=+d.kessan.slice(0,2);kd_=+d.kessan.slice(2,4)}
  if(km>0){
    if(!isP){
      put('法人税等の申告期限',annualFrom(y=>addMonthsClamp(y,km,kd_,2),today,done,'houjinzei'),KD_STD);
      if(d.kazei!=='免税')put('消費税の申告期限',annualFrom(y=>addMonthsClamp(y,km,kd_,2),today,done,'shohizei'),KD_STD);
    }else{
      put('確定申告期限(3/15)',annualFrom(y=>new Date(y+1,2,15),today,done,'kakutei'),KD_STD);
      if(d.kazei!=='免税')put('消費税の申告期限(3/31)',annualFrom(y=>new Date(y+1,2,31),today,done,'shohizei'),KD_STD);
    }
    if(valid6(d.kyoka||''))put('建設業・決算変更届',annualFrom(y=>addMonthsClamp(y,km,kd_,4),today,done,'kessanhenko'),KD_STD);
    put('四半期チェック①(決算9ヶ月前)',annualFrom(y=>addMonthsClamp(y,km,kd_,-9),today,done,'q1check'),null);
    put('四半期チェック②(決算6ヶ月前)',annualFrom(y=>addMonthsClamp(y,km,kd_,-6),today,done,'q2check'),null);
    put('四半期チェック③(決算3ヶ月前・来期の消費税方式を検討)',annualFrom(y=>addMonthsClamp(y,km,kd_,-3),today,done,'q3check'),null);
    put('本決算(決算日)',annualFrom(y=>addMonthsClamp(y,km,kd_,0),today,done,'honkessan'),null);
  }
  if(valid6(d.kyoka||'')){
    const man=new Date(+('20'+d.kyoka.slice(0,2)),+d.kyoka.slice(2,4)-1,+d.kyoka.slice(4,6));
    const prep=new Date(man);prep.setDate(prep.getDate()-90);
    const limit=new Date(man);limit.setDate(limit.getDate()-30);
    put('許可更新の準備開始(満了3ヶ月前)',fixedFrom(prep,done,'kyoka_prep'),null);
    put('許可更新の申請期限(満了30日前)',fixedFrom(limit,done,'kyoka_limit'),null);
  }
  if(d.koken==='あり'&&valid_md4(d.bday||'')){
    const bm=+d.bday.slice(0,2);
    put('後見の定期報告(誕生月末日)',annualFrom(y=>new Date(y,bm,0),today,done,'koken'),KD_KOKEN);
  }
  (Array.isArray(d.dl)?d.dl:[]).forEach((x,i)=>{
    if(!valid6(x.d))return;
    const dt=new Date(+('20'+x.d.slice(0,2)),+x.d.slice(2,4)-1,+x.d.slice(4,6));
    const kk='manual'+i+'_'+(x.n||'');
    if(x.r){
      const mm=dt.getMonth()+1,dd=dt.getDate();
      put(x.n||'手動期限',annualFrom(y=>new Date(y,mm-1,Math.min(dd,new Date(y,mm,0).getDate())),today,done,kk),null);
    }else{
      put(x.n||'手動期限',fixedFrom(dt,done,kk),null);
    }
  });
  return out;
}
function allDeadlines(){
  const today=kToday();
  return entries.filter(e=>e.cat==='kanri'&&!e.arch).flatMap(e=>kanriDeadlines(e,today));
}
let kdOpen='';
function toggleKd(key){kdOpen=(kdOpen===key)?'':key;renderKanriDash()}
function kdDays(dt){return Math.round((dt-kToday())/86400000)}
function renderKanriDash(){
  const box=document.getElementById('kanriDash');if(!box)return;
  if(activeCat!=='kanri'){box.style.display='none';return}
  box.style.display='block';
  const list=allDeadlines().sort((a,b)=>a.date-b.date);
  if(!list.length){
    box.innerHTML='<div class="kd-title">期限ダッシュボード(全顧客)</div><div style="color:var(--sub);font-size:.85rem;padding:4px 2px 8px">顧客カルテがまだありません。上の入力欄で顧客(自分も1件)を登録すると、期限が自動で並びます。</div>';
    return;
  }
  const today=kToday();
  box.innerHTML='<div class="kd-title">期限ダッシュボード(全顧客・近い順)</div>'+list.map(x=>{
    const days=kdDays(x.date);
    const cls=x.over?' kd-over':(days<=30?' kd-soon':'');
    const dtxt=x.over?('超過 '+(-days)+'日'):('あと '+days+'日');
    let exp='';
    if(kdOpen===x.key){
      let st='';
      if(x.steps){
        st=x.steps.map(([n,label])=>{
          const sd=new Date(x.date);sd.setDate(sd.getDate()-n);
          return label+': '+dstr(sd);
        }).join(' → ');
        st='<div>'+esc(st)+'</div>';
      }
      exp=`<div class="kd-exp">${st}<button type="button" class="kd-donebtn" onclick="event.stopPropagation();kdDone('${escAttr(x.id)}','${escAttr(x.key)}','${escAttr(x.kind)}')">対応した(次回分に切替)</button></div>`;
    }
    return `<div class="kd-row${cls}" onclick="toggleKd('${escAttr(x.key)}')">
      <div class="kd-main"><span class="kd-days">${dtxt}</span><span class="kd-date num">${dstr(x.date)}</span><span class="kd-cust">${esc(x.cust)}</span><span class="kd-kind">${esc(x.kind)}</span></div>${exp}
    </div>`;
  }).join('');
}
function kdDone(id,key,label){
  askConfirm('「'+label+'」を対応済みにしますか?(毎年ものは次回分の表示に切り替わります)','対応済みにする',()=>{
    const e=entries.find(x=>String(x.id)===String(id));
    if(!e)return;
    e.data.doneKeys=Array.isArray(e.data.doneKeys)?e.data.doneKeys:[];
    if(!e.data.doneKeys.includes(key))e.data.doneKeys.push(key);
    saveLocal();
    enqueue({action:'save',entry:e,cols:colsOf(e)});
    kdOpen='';
    renderKanriDash();renderBanner();
    toast('対応済みにしました');
  });
}
function renderBanner(){
  const b=document.getElementById('kanriBanner');if(!b)return;
  const list=allDeadlines();
  const over=list.filter(x=>x.over).sort((a,b)=>a.date-b.date);
  const soon=list.filter(x=>!x.over&&kdDays(x.date)<=30).sort((a,b)=>a.date-b.date);
  if(!over.length&&!soon.length){b.style.display='none';b.className='';return}
  b.style.display='block';
  if(over.length){
    b.className='over';
    const o=over[0];
    b.textContent='⚠ 期限超過: '+over.length+'件'+(soon.length?('・30日以内: '+soon.length+'件'):'')+'(最優先: '+o.cust+' '+o.kind+' 超過'+(-kdDays(o.date))+'日) — タップで管理タブへ';
  }else{
    b.className='soon';
    const s0=soon[0];
    b.textContent='⚠ 期限30日以内: '+soon.length+'件(最短: '+s0.cust+' '+s0.kind+' 残り'+kdDays(s0.date)+'日) — タップで管理タブへ';
  }
  b.onclick=()=>{
    guardLeave(()=>{activeCat='kanri';editingId=null;listLimit=20;renderTabs();renderFields();renderTimeline();window.scrollTo({top:0});});
  };
}

function renderGroups(){
  const el=document.getElementById('groupTabs');el.innerHTML='';
  groups.forEach(g=>{
    const b=document.createElement('button');
    b.className='gtab'+(g.id===activeGroup?' active':'');
    b.innerHTML=esc(g.name)+'<span class="del" data-del="1">×</span>';

      if(e.target.dataset.del){removeGroup(g.id);return}
      if(document.body.classList.contains('editmode')&&g.id===activeGroup){renameGroup(g.id);return}
      activeGroup=g.id;renderGroups();renderPickerList();
    };
    el.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='gtab-add';add.textContent='＋分野追加';add.onclick=addGroup;
  el.appendChild(add);
}
function addGroup(){
  askText('新しい分野名(例:相続、入管、投資 など)','',name=>{
    const id='g'+Date.now();groups.push({id,name,members:[]});
    activeGroup=id;renderGroups();renderPickerList();
    toast('分野「'+name+'」を追加しました');cfgSync();
  });
}
function renameGroup(id){
  const g=groups.find(x=>x.id===id);
  askText('分野名を変更',g.name,name=>{
    g.name=name;renderGroups();cfgSync();
  });
}
function removeGroup(id){
  if(groups.length<=1){toast('最後の1個は削除できません');return}
  const g=groups.find(x=>x.id===id);
  askConfirm(`分野「${g.name}」を削除しますか?(所属:${g.members.length}人も一覧から消えます)`,'削除する',()=>{
    groups=groups.filter(x=>x.id!==id);
    if(activeGroup===id)activeGroup=groups[0].id;
    renderGroups();renderPickerList();cfgSync();
  });
}
function renderPickerList(){
  const q=document.getElementById('pickerSearch').value.trim();
  const el=document.getElementById('personList');el.innerHTML='';
  let list;
  if(q){list=groups.flatMap(g=>g.members.filter(m=>m.includes(q)).map(m=>({name:m,g:g.name,gid:g.id})))}
  else{const g=groups.find(x=>x.id===activeGroup);list=g?g.members.map(m=>({name:m,g:null,gid:g.id})):[]}
  if(!list.length){el.innerHTML='<div style="color:var(--sub);font-size:.85rem;padding:14px 4px">該当なし。下の欄から追加できます。</div>'}
  list.forEach(p=>{
    const row=document.createElement('div');row.className='prow';
    const b=document.createElement('button');b.className='pname';
    b.textContent=p.name+(p.g?`(${p.g})`:'');
    b.onclick=()=>pickPerson(p.name);
    const e=document.createElement('button');e.className='pedit';
    e.textContent='名前変更';
    e.onclick=()=>renamePerson(p.gid,p.name);
    row.appendChild(b);row.appendChild(e);
    el.appendChild(row);
  });
}
function renamePerson(gid,oldName){
  askText('名前を変更(過去の記録もまとめて新しい名前になります)',oldName,nm=>{
    if(nm===oldName)return;
    const g=groups.find(x=>x.id===gid);if(!g)return;
    if(g.members.includes(nm)){toast('同じ名前が既に登録されています');return}
    const idx=g.members.indexOf(oldName);
    if(idx>=0)g.members[idx]=nm;
    recentPeople=recentPeople.map(p=>p===oldName?nm:p);
    let changed=0;
    entries.forEach(en=>{
      let hit=false;
      const fs=catFields(en.cat),d=en.data;
      fs.forEach(f=>{
        if(f.type==='person'&&d[f.k]===oldName){d[f.k]=nm;hit=true}
        if(f.type==='personlist'&&Array.isArray(d[f.k])&&d[f.k].includes(oldName)){d[f.k]=d[f.k].map(x=>x===oldName?nm:x);hit=true}
        if((f.type==='ankenlink'||f.type==='bukkenlink')&&typeof d[f.k]==='string'&&d[f.k].includes(oldName)){d[f.k]=d[f.k].split(oldName).join(nm);hit=true}
      });
      if(hit){changed++;enqueue({action:'save',entry:en,cols:colsOf(en)},true)}
    });
    saveLocal();cfgSync();
    renderPickerList();renderRecent();renderTimeline();
    flush();
    toast(changed?('名前を変更し、過去の記録'+changed+'件も更新しました'):'名前を変更しました');
  });
}
function addPerson(){
  const e=document.getElementById('newPersonName');const name=e.value.trim();
  if(!name){toast('名前を入れてください');return}
  const g=groups.find(x=>x.id===activeGroup);
  if(!g.members.includes(name))g.members.push(name);
  e.value='';document.getElementById('pickerSearch').value='';
  renderPickerList();toast(`「${g.name}」に追加しました`);cfgSync();
}

/* ============== 一覧・詳細・コピー ============== */
function catName(id){const c=catOf(id);return c?c.name:'(削除済みボタン)'}
function catColor(id){const c=catOf(id);return c?c.color:'#AAB0BA'}
function catFields(id){const c=catOf(id);return c?c.fields:[]}
function statlines(id){return catFields(id).filter(f=>f.type==='statline')}
function fmtAmt(n){return '¥'+Number(n||0).toLocaleString('ja-JP')}
function fmtMin(m){if(!m)return'';return m>=60?(Math.floor(m/60)+'時間'+(m%60?m%60+'分':'')):m+'分'}

function entryValues(e){
  const vals=[];
  Object.values(e.data).forEach(v=>{
    if(v===''||v===undefined||v===null)return;
    if(Array.isArray(v)){if(v.length)vals.push(v.join(' '))}
    else vals.push(String(v));
  });
  return vals;
}
let urgOn=false,impOn=false,showDone=false,ankenFilter='',archOn=false;
let listLimit=20,catFilter='';
function searchInput(){listLimit=20;renderTimeline()}
function toggleCat(id){catFilter=(catFilter===id)?'':id;listLimit=20;paintFilters();renderTimeline()}
function toggleUrg(){urgOn=!urgOn;listLimit=20;paintFilters();renderTimeline()}
function toggleImp(){impOn=!impOn;listLimit=20;paintFilters();renderTimeline()}
function toggleDone(){showDone=!showDone;listLimit=20;paintFilters();renderTimeline()}
function toggleArch(){archOn=!archOn;listLimit=20;paintFilters();renderTimeline()}
function paintFilters(){
  const set=(id,on)=>{const el=document.getElementById(id);if(el)el.className='fbtn'+(on?' on':'')};
  set('fb_urg',urgOn);
  set('fb_imp',impOn);
  set('fb_done',showDone);
  set('fb_arch',archOn);
}
function passFilters(e){
  const d=e.data||{};
  if(catFilter&&e.cat!==catFilter)return false;
  if(archOn){
    if(!e.arch)return false;
  }else{
    if(e.arch)return false;
    if(ankenFilter){
      /* 案件フィルター中: その案件本体+紐づく記録を、完了も含めて全部表示 */
      const linked=(e.cat==='anken'&&ankenLabel(e)===ankenFilter)||(typeof d.anken==='string'&&d.anken===ankenFilter);
      if(!linked)return false;
    }else{
      if(!showDone&&d.doneStat==='完了')return false;
    }
  }
  const p=Array.isArray(d.prio)?d.prio:[];
  if(urgOn&&!p.includes('緊急'))return false;
  if(impOn&&!p.includes('重要'))return false;
  return true;
}
const CAT_ORDER={task:1,kanri:2,jikan:3,shukan:4,shushi:5,anken:6,bukken:7,neta:8,houjin:9,kojin:10,orei:11,pf:12,genkin:13};
function catOrderRel(e){
  if(e.cat===activeCat)return 0;
  return (CAT_ORDER[e.cat]||50)+1;
}
function doneRank(e){return (e.data&&e.data.doneStat==='完了')?1:0}
function sortForList(list){return list.sort((a,b)=>catOrderRel(a)-catOrderRel(b)||doneRank(a)-doneRank(b)||((b.ts||0)-(a.ts||0)))}
function matches(e,q){
  const hay=[catName(e.cat),...entryValues(e)].join(' ');
  return q.split(/[\s\u3000]+/).filter(Boolean).every(t=>hay.includes(t));
}

function summaryHTML(e){
  const fs=catFields(e.cat);const d=e.data;
  let badges='';
  fs.filter(f=>f.type==='flags'&&Array.isArray(d[f.k])&&d[f.k].length).forEach(f=>{
    sortFlags(d[f.k].slice()).forEach(fv=>{
      if(fv==='なし')return;
      const cls=fv==='緊急'?' pa':fv==='重要'?' pb':'';
      badges+=`<span class="badge${cls}">${esc(fv)}</span>`;
    });
  });
  statlines(e.cat).forEach(fd=>{
    const sv=d[fd.sk]||fd.options[0];
    badges+=`<span class="badge ${sv===fd.options[1]?'bgreen':'bred'}">${esc(sv)}</span>`;
  });
  badges+=fs.filter(f=>f.type==='select'&&d[f.k]&&d[f.k]!=='未設定'&&f.k!=='io').map(f=>{
    const val=d[f.k];const lab=(f.labels&&f.labels[val])||val;
    return `<span class="badge">${esc(lab)}</span>`;
  }).join('');
  if(d.anken)badges+=`<span class="badge">${esc(String(d.anken).slice(0,14))}</span>`;
  if(d.bukkenref)badges+=`<span class="badge">${esc(String(d.bukkenref).slice(0,14))}</span>`;
  if(e.arch)badges+=`<span class="badge">アーカイブ</span>`;
  const persons=fs.filter(f=>f.type==='person'&&d[f.k]&&f.k!=='delegate').map(f=>d[f.k]);
  let parts=[];
  if(persons.length)parts.push('<b>'+esc(persons.join(' / '))+'</b>');
  if(d.amount!==''&&d.amount!==undefined){
    const cls=d.io==='収入'?'amt-in':(d.io==='支出'?'amt-out':'');
    const sign=d.io==='収入'?'＋':(d.io==='支出'?'−':'');
    parts.push(`<span class="num ${cls}">${sign}${fmtAmt(d.amount)}</span>`);
  }
  if(d.minutes)parts.push(`<span class="num">${fmtMin(d.minutes)}</span>`);
  if(d.seconds!==''&&d.seconds!==undefined&&d.seconds!==null&&d.seconds!==0)parts.push(`<span class="num">${d.seconds}秒</span>`);
  const mainF=fs.find(f=>f.main&&['text','textarea','bigtext'].includes(f.type));
  const mainTxt=mainF?d[mainF.k]:(d.content||'');
  if(mainTxt)parts.push(esc(mainTxt));
  return {badges,line:parts.join('　')};
}
function renderTimeline(){
  const q=document.getElementById('searchBox').value.trim();
  const el=document.getElementById('timeline');el.innerHTML='';
  const list=sortForList(entries.filter(passFilters).filter(e=>!q||matches(e,q)));
  if(!list.length){el.innerHTML='<div class="empty-timeline">表示できる記録がありません(完了分は「完了を含む」で表示されます)</div>';renderBanner();renderKanriDash();return}
  const shown=list.slice(0,listLimit);
  shown.forEach(e=>{
    const s=summaryHTML(e);
    const d=document.createElement('div');d.className='rec';
    d.innerHTML=`<div class="tabmark" style="background:${catColor(e.cat)}"></div>
      <div class="body">
        <div class="meta"><span class="cat">${esc(catName(e.cat))}</span><span class="num">${fmt6(e.data.date)}</span>${s.badges}</div>
        <span class="txt">${s.line||'(内容なし)'}</span>
      </div>`;
    d.onclick=()=>openDetail(e.id);
    el.appendChild(d);
  });
  if(list.length>shown.length){
    const m=document.createElement('button');
    m.className='morebtn';
    m.textContent='さらに表示(残り '+(list.length-shown.length)+' 件)';
    m.onclick=()=>{listLimit+=50;renderTimeline()};
    el.appendChild(m);
  }
  renderBanner();renderKanriDash();
}
function openDetail(id){
  detailId=id;
  const e=entries.find(x=>x.id===id);
  document.getElementById('detailTab').style.background=catColor(e.cat);
  document.getElementById('detailCat').textContent=catName(e.cat);
  document.getElementById('detailMeta').textContent=fmt6(e.data.date);
  const b=document.getElementById('detailBody');
  b.innerHTML=catFields(e.cat).filter(f=>f.k!=='date').map(f=>{
    if(f.type==='flags'){
      const arr=Array.isArray(e.data[f.k])?sortFlags(e.data[f.k].slice()):[];
      if(!arr.length)return'';
      const pills=arr.map(x=>x==='なし'
        ?`<span style="font-size:.9rem;color:var(--sub)">なし</span>`
        :`<span class="bpill ${x==='緊急'?'fy':'fp'}">${esc(x)}</span>`).join('');
      return `<div class="dl"><div class="k">区分</div><div class="v">${pills}</div></div>`;
    }
    if(f.type==='statline'){
      const sv=e.data[f.sk]||f.options[0];
      const dspan=f.dk?`<span style="font-size:.85rem;color:var(--sub)">${f.dlabel.replace('(6桁)','')}: <span class="num">${e.data[f.dk]?iso6(e.data[f.dk]):'—'}</span></span>`:'';
      return `<div class="dl"><div class="k">${f.label}</div><div class="v">
        <span class="bpill ${sv===f.options[1]?'green':'red'}">${esc(sv)}</span>
        ${dspan}</div></div>`;
    }
    let v=e.data[f.k];
    if(v===''||v===undefined||v===null)return'';
    if(Array.isArray(v)){if(!v.length)return'';v=v.join('、')}
    if(f.type==='amount')v=fmtAmt(v);
    if(f.type==='minutes')v=fmtMin(v);
    if(f.type==='seconds')v=v+'秒';
    if(f.type==='date6o')v=iso6(v)||v;
    if(f.type==='time4')v=fmt4(v)||v;
    if(f.type==='md4')v=(typeof v==='string'&&v.length===4)?v.slice(0,2)+'/'+v.slice(2,4):v;
    if(f.type==='deadlist')v=(v||[]).map(x=>x.n+'('+(iso6(x.d)||x.d)+(x.r?'・毎年':'')+')').join('、');
    if(f.type==='select'&&f.labels&&f.labels[v])v=f.labels[v]+'('+v+')';
    return `<div class="dl"><div class="k">${f.label.replace(/(＋.*)/,'').trim()}</div><div class="v">${esc(v)}</div></div>`;
  }).join('');
  const acts=document.getElementById('detailActions');
  if(e.arch){
    acts.innerHTML='<button onclick="copyOne()">この1件をコピー</button><button onclick="unarchiveOne()">一覧に戻す</button><button class="danger" onclick="hardDeleteOne()">完全削除</button>';
  }else{
    acts.innerHTML='<button onclick="copyOne()">この1件をコピー</button><button onclick="editOne()">編集する</button><button class="danger" onclick="archiveOne()">アーカイブ</button>';
  }
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open')}
function entryText(e){
  const lines=['【'+catName(e.cat)+'】'+iso6(e.data.date)];
  catFields(e.cat).filter(f=>f.k!=='date').forEach(f=>{
    if(f.type==='statline'){
      const sv=e.data[f.sk]||f.options[0];
      lines.push(f.label+': '+sv);
      if(f.dk&&e.data[f.dk])lines.push(f.dlabel.replace('(6桁)','')+': '+iso6(e.data[f.dk]));
      return;
    }
    let v=e.data[f.k];
    if(v===''||v===undefined||v===null)return;
    if(Array.isArray(v)){if(!v.length)return;v=v.join('、')}
    if(f.type==='amount')v=fmtAmt(v);
    if(f.type==='minutes')v=fmtMin(v);
    if(f.type==='seconds')v=v+'秒';
    if(f.type==='date6o')v=iso6(v)||v;
    if(f.type==='time4')v=fmt4(v)||v;
    if(f.type==='md4')v=(typeof v==='string'&&v.length===4)?v.slice(0,2)+'/'+v.slice(2,4):v;
    if(f.type==='deadlist')v=(v||[]).map(x=>x.n+'('+(iso6(x.d)||x.d)+(x.r?'・毎年':'')+')').join('、');
    lines.push(f.label.replace(/[(（][^)）]*[)）]/g,'').replace(/(＋.*)/,'').trim()+': '+v);
  });
  return lines.join('\n');
}
function copyOne(){const e=entries.find(x=>x.id===detailId);copyText(entryText(e),'1件コピーしました')}
function editOne(){
  const e=entries.find(x=>x.id===detailId);
  guardLeave(()=>{
    activeCat=e.cat;editingId=e.id;
    renderTabs();renderFields(e.data);closeDetail();
    window.scrollTo({top:0});
    toast('入力欄に読み込みました。修正して保存してください');
  });
}
function archiveOne(){
  const id=detailId;
  askConfirm('この記録をアーカイブしますか?(一覧から見えなくなりますが、データは残ります)','アーカイブする',()=>{
    const e=entries.find(x=>String(x.id)===String(id));
    if(!e)return;
    e.arch=1;
    saveLocal();
    enqueue({action:'save',entry:e,cols:colsOf(e)});
    closeDetail();renderTimeline();toast('アーカイブしました(フィルターの「アーカイブ」で見られます)');
  });
}
function unarchiveOne(){
  const e=entries.find(x=>String(x.id)===String(detailId));
  if(!e)return;
  delete e.arch;
  saveLocal();
  enqueue({action:'save',entry:e,cols:colsOf(e)});
  closeDetail();renderTimeline();toast('一覧に戻しました');
}
function hardDeleteOne(){
  const id=detailId;
  askConfirm('完全に削除しますか?(元に戻せません)','完全削除する',()=>{
    entries=entries.filter(x=>String(x.id)!==String(id));
    saveLocal();
    enqueue({action:'delete',id:id});
    closeDetail();renderTimeline();toast('完全に削除しました');
  });
}
function copyAll(){
  const q=document.getElementById('searchBox').value.trim();
  const list=sortForList(entries.filter(passFilters).filter(e=>!q||matches(e,q)));
  if(!list.length){toast('コピーする記録がありません');return}
  const text=list.map(entryText).join('\n----------------------------------------\n');
  copyText(text,q?`検索結果 ${list.length}件をコピーしました`:`全 ${list.length}件をコピーしました`);
}
function copyText(t,msg){
  navigator.clipboard.writeText(t).then(()=>toast(msg)).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');ta.remove();toast(msg);
  });
}

/* ============== その他 ============== */
function toggleEdit(){
  document.body.classList.toggle('editmode');
  const on=document.body.classList.contains('editmode');
  document.getElementById('editToggle').classList.toggle('on',on);
  document.getElementById('editToggle').textContent=on?'編集モード終了':'編集モード';
  renderTabs();
  if(document.getElementById('pickerOverlay').classList.contains('open'))renderGroups();
  if(on)toast('タブの追加/削除、選択中タブをもう一度押すと名前変更');
}
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),4000);
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return esc(s).replace(/"/g,'&quot;')}

(function(){
  const ec=document.getElementById('entrycard');
  if(ec){
    ['input','click','focusin','keydown','touchstart'].forEach(ev=>{
      ec.addEventListener(ev,()=>{lastTouch=Date.now()},true);
    });
  }
})();
(function(){
  const sb=document.getElementById('searchBox');
  let bypass=false;
  sb.addEventListener('focus',()=>{
    if(bypass){bypass=false;return}
    if(needGuard()){
      sb.blur();
      askConfirm('区分を選んでいません。保存されていませんが、次の画面に行っていいですか?','移動する',()=>{bypass=true;sb.focus();});
    }
  });
})();
loadLocal();
migrate();
renderTabs();renderFields();
setTimeout(renderTimeline,0);
updStat();
if(!apiKey){showKeyScreen('初回設定です');updStat('未接続');}
else{fetchAll();}
window.addEventListener('online',flush);
setInterval(flush,30000);
